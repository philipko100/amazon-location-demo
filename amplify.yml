version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Vite 6 needs Node 18+. Amplify's default image has nvm; pin to 20.
        - nvm install 20
        - nvm use 20
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
